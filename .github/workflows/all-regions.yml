name: All Regions Network Benchmark

on:
  schedule:
    - cron: '0 */4 * * *'  # Runs every 4 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  trigger-regional-workflows:
    name: Trigger All Regional Workflows
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Trigger Africa Region Workflow
      run: |
        gh workflow run "Africa Network Benchmark" || echo "Failed to trigger Africa workflow"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Wait before next trigger
      run: sleep 60

    - name: Trigger Asia East Region Workflow
      run: |
        gh workflow run "Asia East Network Benchmark" || echo "Failed to trigger Asia East workflow"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Wait before next trigger
      run: sleep 60

    - name: Trigger Asia Southeast Region Workflow
      run: |
        gh workflow run "Asia Southeast Network Benchmark" || echo "Failed to trigger Asia Southeast workflow"
